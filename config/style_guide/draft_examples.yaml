examples:
  - paragraph: |
      初代剑尊，1500年前的剑道魁首。他的剑道成就，横压后世五百年，无人能出其右。他曾说过：吾即剑道！在那五百年间，他虽已经离世，但也是无数剑修的剑道信仰，甚至在剑宗，已然成为精神图腾般的存在。
    traits:
      - 时间跨度建立权威背景
      - 口号式短句塑造神格
      - 叙述与评价交织营造史诗感
  - paragraph: |
      直至一千年前，那个手中无剑却自称剑修的小道士，横空出世。他太强了，强到从大家口中的小道士，逐渐成为了道主，然后又变为道祖。他选择了握住那把剑，他便是当今剑道第一人。他若选择握刀、握枪，亦是同理。
    traits:
      - 递进升级塑造压迫感
      - 平行结构强化强度对比
      - 选择假设凸显人物高度
  - paragraph: |
      “就是你这长相吧。”他欲言又止。啧，这也过于高大英俊了，善妒的小师叔必然不喜。不过也没事，万一隔代亲呢？更何况，他本来就是小师叔亲自挑选上山的人啊。李春松觉得没有什么大问题。“六长老，长相？”楚槐序听他欲言又止，便问了一嘴。“没什么，长得不错，有我年轻时三分风采！”李春松随口打了个哈哈。
    traits:
      - 内心吐槽与对白交错
      - 轻松语气推进人物关系
      - 短句与语气词拉快节奏
  - paragraph: |
      李春松一挥衣袖，整个人便浮空而起，御空而去。记名弟子这种小事，他恐怕转头就忘。徐子卿只觉得天旋地转，陷入了懵懵的状态，心情有了极大的起伏，耳朵里都传来了阵阵耳鸣声，看着无比恍惚。“啪——！”他的后背被楚槐序猛地拍了一下，有几分用力，直接把他给拍醒拍痛，整个人麻麻的。“走啊！还愣着干什么，和我去见牛执事！”说完，他就头也不回的兀自向前走去。徒留清秀少年愣在原地，深深地看了一眼他那颇为懒散的高大背影，然后用力一捏拳，指甲都嵌入了皮肉中，小跑着就埋头跟了上去。
    traits:
      - 动作触发感官反馈
      - 命令句推动场景转场
      - 外部动作与情绪起伏同步
