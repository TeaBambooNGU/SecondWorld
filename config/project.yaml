project:
  title: "SecondWorld"
  language: "zh"

providers:
  anthropic:
    baseUrl: "https://code.ppchat.vip"
    api: "anthropic-messages"
    apiKeyEnv: "ANTHROPIC_API_KEY"
    model_name: "claude-sonnet-4-6"
    thinking:
      type: "adaptive"
    timeoutSec: 120
    maxRetries: 3
    stream: true
    models:
      - model_name: "claude-opus-4-6"
        name: "Claude Opus 4.6"
      - model_name: "claude-sonnet-4-6"
        name: "Claude Sonnet 4.6"
      - model_name: "claude-haiku-4-5-20251001"
        name: "Claude Sonnet 4.5"
  deepseek:
    baseUrl: "https://api.deepseek.com"
    apiKeyEnv: "DEEPSEEK_API_KEY"
    timeoutSec: 120
    maxRetries: 3
    stream: true
    models:
      - id: "deepseek-reasoner"
        name: "DeepSeek Reasoner"

api:
  provider: "anthropic"

generation:
  chapter_min_chars: 3000
  chapter_max_chars: 5000
  max_agents_per_chapter: 10
  max_turns: 2
  agent_concurrency: 3
  temperature: 1.5
  top_p: 0.7
  top_k: 50

dialogue:
  max_concurrency: 3
  memory_summary_every: 10
  memory_summary_threshold: 30

paths:
  agents: "config/agents.yaml"
  outline: "config/outline.yaml"
  style_guide_shared: "config/style_guide/anti_ai_rules.md"
  style_guide_agents_dir: "config/style_guide/agents"
  style_guide_components_dir: "config/style_guide/components"
  style_guide_draft_examples: "config/style_guide/draft_examples.yaml"
  output_dir: "chapters"
  state_path: "data/state.json"
  plans_dir: "data/plans"
