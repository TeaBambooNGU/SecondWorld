series:
  title: "玄幻小说"
  premise: "灵气复苏三万年后，神州裂分为法则迥异的九大域。表面是仙魔争锋、王朝更迭的大争之世，实则暗藏上古危机与各方势力掠夺气运、编织阴谋的巨网。故事跟随不同出身的角色，在九域法则的碰撞与吞噬中，探寻世界真相并挣扎求存。"
  tone: "生动、幽默、权谋、群像、残酷、充满反讽与转折的东方玄幻"
  themes: ["在史诗废墟上蹦迪", "被遗忘者的觉醒与反抗", "热血成长", "兄弟义气", "我们以为在打BOSS，其实只是帮幕后黑手清了波野怪"]

world:
  setting: "灵气复苏纪元三万载，神州裂分九域：灵脉本源【中州】、宗门剑道【云州】、皇朝国运【龙廷】、仙凡暗治【玄渊州】、无序丛林【荒川】、岛海秘宝【沧溟海】、百艺垄断【灵州】、妖主图腾【妖域】、信仰愿力【琉璃净土】。九域表面独立，实则通过资源、阴谋与古老关联紧密交织，共同面对潜伏的危机"
  power_system: "九域九法，多元并存。核心围绕灵气展开，但各域演化出独特体系：中州（灵脉与法则）、云州（剑道与宗门传承）、龙廷（皇权与国运修为）、玄渊州（仙凡双轨制）、荒川（掠夺与禁忌传承）、沧溟海（秘宝与海陆之力）、灵州（丹符阵器等技艺造物）、妖域（妖族血脉与人族图腾祖灵之力）、琉璃净土（信仰愿力与佛法）。不同体系间存在压制、互补与冲突"

chapters:
  - id: "0001"
    title: "三星照命"
    summary: "荧惑侯国三皇子于皓的十岁生辰。宴席上，父皇赐下象征‘逍遥’的灵玉，母后满眼宠溺。二哥于瑞送上亲手编纂的《民风拾录》，大哥于年则从边关寄回一柄未开刃的短剑。觥筹交错间，来自六星皇朝的使臣神色倨傲，递交的国书隐有‘灵矿加征三成’之句。于皓只顾把玩新得的、产自灵州的机关雀，对席间的暗流浑然不觉。"
    cast_hint: ["于皓（天真受宠的三皇子）", "于瑞（心系民生的二皇子）", "荧惑侯（忧虑却强撑威严的父皇）", "六星皇朝使臣（傲慢的压迫者）"]

  - id: "0002"
    title: "灵雀与奏章"
    summary: "于皓操纵机关雀飞越宫墙，偶然窥见父皇在御书房内，对着一份破损的边境地图长叹。案几上，堆着来自玄渊州‘悬空寺’的祈福玉简，以及灵州‘百炼阁’催付炼材的账目。他好奇张望，却被侍从匆匆引开。同日，二哥在偏殿审理一桩农户与低阶修士争水的案子，眉头紧锁。"
    cast_hint: ["于皓", "荧惑侯", "内侍总管福安（谨慎的老仆）", "于瑞"]

  - id: "0003"
    title: "边关来的风"
    summary: "大哥于年短暂回朝述职。他风尘仆仆，铠甲上带着北方荒川边境特有的煞气。他讲述与流亡者营地的摩擦，并警告国内某些商队可能在与荒川进行禁忌交易。于皓觉得大哥的故事比戏文还精彩，缠着他要听细节，却忽略了大哥与父皇密谈时，提及“镇国龙鼎气运微澜”时的凝重。"
    cast_hint: ["于年（沉稳英武的大皇子）", "于皓", "荧惑侯", "戍边老将（背景提及）"]

  - id: "0004"
    title: "秋狝惊羽"
    summary: "皇家秋猎。于皓为追一只罕见的雪貂，误入猎场边缘的迷雾峡谷。在那里，他发现了一处残留着微弱剑意的古老石壁（云州风格的剑痕），以及几具刚死不久、身着不明服饰的尸体。尸体旁，有被匆忙掩埋的、刻着扭曲符文的黑色矿石。他被禁卫寻回，事件以‘流寇械斗’被轻描淡写地压下。"
    cast_hint: ["于皓", "禁卫统领赵锋（忠诚但有所隐瞒）", "神秘尸体（伏笔）", "雪貂（引子）"]

  - id: "0005"
    title: "学宫来的先生"
    summary: "来自中州万象学宫的客座讲师抵达侯国，名义上是为皇室子弟启蒙‘寰宇见闻’。于皓对枯燥的九域历史毫无兴趣，却在讲师展示的一幅《万域图志》残卷上，隐约看到自家侯国的版图被标注了极淡的、闪烁的符文。讲师意味深长地看了他一眼，课后赠他一枚可记录见闻的普通玉简。"
    cast_hint: ["万象学宫讲师文渊（神秘的观察者）", "于皓", "于瑞（对讲师学识很感兴趣）"]

  - id: "0006"
    title: "母后的忧虑"
    summary: "母后家族所在的沿海商路传来消息，沧溟海航线近来海盗频出，且疑似有魔龙宫海族活动的迹象，导致一批重要的“深海寒铁”延误。这笔物资，是向灵州百炼阁定制一批灵甲的关键。母后忧心忡忡，于皓却用玉简记录下窗外两只灵鸟打架，想逗母后开心。"
    cast_hint: ["皇后（母后，家族涉足商路）", "于皓", "母族来的信使（焦虑）"]

  - id: "0007"
    title: "上元灯夜"
    summary: "上元灯会，举城欢庆。于皓溜出宫，在市井中流连忘返。他目睹了民间匠人精巧的灯笼手艺（灵州技艺的民间渗透），也听到了茶楼里说书人隐晦抨击“仙门征税”的故事（影射玄渊州）。在一条暗巷，他撞见一名受伤的修士正被官差模样的人盘问，修士低声疾呼“龙鼎有……”后便被带走。于皓心头一跳，但很快被绚烂的烟花吸引了注意。"
    cast_hint: ["于皓", "民间说书人", "受伤的神秘修士（伏笔）", "便衣官差（隶属未知势力）"]

  - id: "0008"
    title: "二哥的账簿"
    summary: "于皓去找二哥，发现他正对着一本厚厚的账簿发愁。上面记录着各地粮仓的异常损耗、灵矿产量连续三年下降，以及几笔去向不明的巨额“供奉”（指向中州或玄渊州）。二哥叹气，对于皓说：“辰弟，你看这灯，亮着的时候，总以为灯油是取之不尽的。”于皓似懂非懂。"
    cast_hint: ["于瑞", "于皓", "户部老吏（背景提及）"]

  - id: "0009"
    title: "剑舞与阴影"
    summary: "为贺邻国三星侯国君寿诞，宫廷举行演武。一名来自云州的流浪剑客献上惊艳剑舞，获重赏。但于年私下告诉于皓，此人剑意中隐有“阴煞”之气（云州魔道特征），且演武后曾与本国一位负责矿务的官员密谈。于皓不以为然：“能舞这么好看的剑，能是坏人么？”"
    cast_hint: ["流浪剑客柳七（身份可疑）", "于年", "于皓", "矿务官员（伏笔）"]

  - id: "0010"
    title: "灵州来信"
    summary: "百炼阁的正式通牒送达：因“深海寒铁”未到，灵甲交付延期，且因“龙廷整体局势动荡”，后续所有法器价格上调两成。父皇在朝会上大发雷霆，痛斥相关官员无能。下朝后，却独自在祖庙待了很久。于皓发现，父皇鬓角的白发，似乎一夜之间多了不少。"
    cast_hint: ["荧惑侯", "于皓（旁观视角）", "百炼阁使者（公事公办的冷漠）"]

  - id: "0011"
    title: "夜宴杀机"
    summary: "招待六星皇朝巡察使的夜宴。使者言语傲慢，多次以“上国需筹备与九星帝朝大典”为由，暗示加征。席间，一名舞姬（实为“影阁”刺客）突然发难，目标直指巡察使，却被隐藏在使者随从中的高手瞬间反制。宴会不欢而散。父皇连夜下令全城戒严，彻查刺客来源。于皓第一次感受到宫殿中弥漫的刺骨寒意。"
    cast_hint: ["六星皇朝巡察使", "神秘舞姬刺客", "使者随从中的高手", "于皓", "荧惑侯"]

  - id: "0012"
    title: "地动微兆"
    summary: "侯国境内一处偏远山脉发生轻微地动，暴露出一个古老的小型祭坛遗迹。遗迹风格非本土所有，带有浓厚的妖域图腾特征，但已被严重破坏。民间流言四起，说这是“妖邪入侵”或“地龙翻身，国运不稳”的征兆。二哥奉命前往安抚民心，于皓偷偷跟去，在遗迹捡到半片残破的、刻着狰狞兽首的黑色瓦当。"
    cast_hint: ["于瑞", "于皓", "当地乡老（惊恐）", "遗迹（妖域关联伏笔）"]

  - id: "0013"
    title: "佛国的赠礼"
    summary: "一队自称来自琉璃净土的行脚僧路过，为皇室带来高僧开光的“护国佛珠”，言称可“镇宅安邦，净化心魔”。母后欣然接受，供奉于内殿。于皓觉得佛珠金光太刺眼，不如自己收集的雨花石好看。行脚僧中，有一人目光扫过宫廷各处，尤其在镇国龙鼎的仿制品前停留片刻，低声诵了句佛号。"
    cast_hint: ["行脚僧首领", "目光锐利的年轻僧人", "皇后", "于皓"]

  - id: "0014"
    title: "大哥的警告"
    summary: "于年即将返回边关。临行前，他罕见地严肃告诫于皓：“辰弟，这宫里宫外，眼睛太多。你贪玩可以，但记住，不要轻易相信任何‘偶然’的馈赠，也不要深究不该你知道的事。若……若真有事，去我书房暗格，里面有给你留的东西。”于皓被大哥的神情吓到，懵懂点头。"
    cast_hint: ["于年", "于皓", "兄弟间的凝重时刻"]

  - id: "0015"
    title: "暗市见闻"
    summary: "于皓在侍卫的掩护下，再次溜出宫，潜入黑市想淘换新奇玩意儿。他无意中听到两个商人在角落低声交易，提及“荒川的噬魂矿”、“玄渊州那边催得急”，以及“侯国气运节点”等词。他想凑近听清，却被侍卫以“此地危险”为由强行拉走。"
    cast_hint: ["于皓", "贴身侍卫阿虎（忠诚但紧张）", "神秘黑市商人（伏笔）"]

  - id: "0016"
    title: "龙鼎祭典"
    summary: "年度祭鼎大典，祈求国运昌隆。仪式中，那尊仿制的镇国龙鼎（真鼎在龙廷帝都）突然发出一声轻微的、几乎不可闻的哀鸣，鼎身一道旧裂纹似乎扩大了发丝般的细微。主祭的术士脸色瞬间惨白，强行以自身精血激发符文稳住，声称“龙气激荡，乃大吉之兆”。唯有父皇和少数重臣，面色极其难看。"
    cast_hint: ["荧惑侯", "主祭术士（掩饰慌乱）", "于皓（隐约感觉不安）", "于瑞（眉头紧锁）"]

  - id: "0017"
    title: "密信与抉择"
    summary: "于皓在御花园假山后，撞见二哥于瑞正与一名身着玄渊州风格服饰的修士密谈。修士许以“仙门庇护”，条件是侯国暗中改换供奉对象，并提供境内一处灵脉的完全开采权。于瑞严词拒绝：“荧惑虽小，国格不可卖，民脂民膏不可献于豺狼。”修士冷笑离去。于皓屏息躲藏，心中震动。"
    cast_hint: ["于瑞", "玄渊州修士（诱惑与威胁）", "于皓（首次直面残酷现实）"]

  - id: "0018"
    title: "暴雨前夕"
    summary: "边关急报：荒川流亡者大规模异动，疑似有组织。邻国三星侯国“炎阳”突然陈兵边境，借口追捕逃犯。灵州正式通知，所有丹药、符篆对三星侯国级别实施限购。六星皇朝使臣再次到来，下达最终通牒式的加征额度。噩耗接踵而至，朝堂之上，死一般的寂静。于皓看到，父皇挺直的背影，第一次显得有些佝偻。"
    cast_hint: ["荧惑侯", "传令兵", "六星皇朝使臣", "满朝文武（绝望气氛）", "于皓"]

  - id: "0019"
    title: "最后的欢宴"
    summary: "母后强打精神，举办了一场小型家宴，仿佛一切如常。她亲自下厨做了于皓最爱吃的点心，为于年遥祝平安，叮嘱于瑞注意身体。席间，她将一枚贴身佩戴的、刻有家族徽记的玉佩，挂在了于皓脖子上，温柔地说：“辰儿，无论将来发生什么，都要好好活着。”于皓心中莫名酸楚。"
    cast_hint: ["皇后", "于皓", "于瑞", "缺席的于年（氛围伤感）"]

  - id: "0020"
    title: "烽火照夜"
    summary: "深夜，冲天的喊杀声与灵术爆炸的光焰，撕裂了都城宁静的夜空。敌国“炎阳”联合一股身份不明的精锐修士（混合了荒川、玄渊州特征），发动闪电突袭。宫墙破裂，禁卫浴血。父皇披甲执剑，将一封早已写好的、盖有秘印的血书塞给于皓，嘶吼着命令最忠心的影卫带他从密道离开。于皓回头最后一眼，看到的是二哥持剑冲向敌群的背影，以及母后宫殿方向燃起的熊熊大火。他手中的灵玉，啪嚓一声，碎成了粉末。"
    cast_hint: ["荧惑侯（末路的君王）", "于皓（巨变与逃亡的开始）", "影卫首领（沉默的死士）", "敌国军队与神秘修士", "于瑞（最后的奋战）"]