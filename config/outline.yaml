series:
  title: "玄幻小说"
  premise: "灵气复苏三万年后，神州裂分为法则迥异的九大域。表面是仙魔争锋、王朝更迭的大争之世，实则暗藏上古危机与各方势力掠夺气运、编织阴谋的巨网。故事跟随不同出身的角色，在九域法则的碰撞与吞噬中，探寻世界真相并挣扎求存。"
  tone: "生动、幽默、权谋、群像、残酷、充满反讽与转折的东方玄幻"
  themes: ["在史诗废墟上蹦迪", "被遗忘者的觉醒与反抗", "热血成长", "兄弟义气", "我们以为在打BOSS，其实只是帮幕后黑手清了波野怪"]

world:
  setting: "灵气复苏纪元三万载，神州裂分九域：灵脉本源【中州】、宗门剑道【云州】、皇朝国运【龙廷】、仙凡暗治【玄渊州】、无序丛林【荒川】、岛海秘宝【沧溟海】、百艺垄断【灵州】、妖主图腾【妖域】、信仰愿力【琉璃净土】。九域表面独立，实则通过资源、阴谋与古老关联紧密交织，共同面对潜伏的危机"
  power_system: "九域九法，多元并存。核心围绕灵气展开，但各域演化出独特体系：中州（灵脉与法则）、云州（剑道与宗门传承）、龙廷（皇权与国运修为）、玄渊州（仙凡双轨制）、荒川（掠夺与禁忌传承）、沧溟海（秘宝与海陆之力）、灵州（丹符阵器等技艺造物）、妖域（妖族血脉与人族图腾祖灵之力）、琉璃净土（信仰愿力与佛法）。不同体系间存在压制、互补与冲突"

chapters:
  - id: "0001"
    title: "寿诞贡礼见血"
    summary: "开篇：御花园廊下，于皓被太傅何镜山罚站听训，嘴上“躺平哲学”一套一套，偏要在寿诞贡礼过目的礼制场面里插科打诨；尚珍司女官柳清荷捧着封条与简册走流程，羽林队正韩策押箱列队，人人都当这是排场——宫里却都知道九曜侯于承曜近来盯内廷用度，谁也不敢出差池。推进：一名库役搬箱时抬箱角度刻意避人，箱口封蜡边缘却被日光一照，露出细小的二次熔接鼓泡与裂纹，像是热过又压回去的痕；于皓为了显摆“我眼睛最毒”，当场指着封蜡大声嘲讽“这封得也太敷衍了”，顺势横身挡在押箱队伍前嚷嚷要当众验封，羽林不得不停步核验腰牌将人按住；那库役抬眼看了于皓一瞬，竟当众咬破舌下毒囊，血沫涌出，人倒在贡礼箱前。钩子：混乱里，于皓先一步瞥见那库役靴侧滑出一枚戏楼后台通行牌，像是专门“掉给人捡”的线索；何镜山与羽林忙着封场、封箱、押人清点，反倒没顾上这点细枝末节。于皓心里一热，悄悄把通行牌揣进袖里：只要我先把线头揪出来，明天就能给父皇于承曜、母后沈昭容一个惊喜——让他们知道，我也能解决问题。"
    cast_hint: ["于皓（三皇子）", "何镜山", "张福海", "柳清荷(尚珍司女官)", "韩策(羽林队正)", "库役(死士)"]
    foreshadowing: "死士主动露破绽并断口自尽，后台通行牌引流=京都风月大伏笔；于皓私藏证物、自作聪明想立功=入局关键；寿诞礼制将把“小案”升级成政治刀。"
  - id: "0002"
    title: "戏楼一步踏进局"
    summary: "承接：御花园出了人命，羽林与内务府迅速接管，司库封库、尚珍司复验，人人闭嘴，何镜山只冷冷丢给于皓一句：“别添乱，回宫等消息。”；推进：于皓偏不信邪，揣着那枚“自己藏起来的”后台通行牌带张福海直奔戏楼，自以为只要顺着后台摸到线头，就能把贡礼的麻烦在入夜前压下去，明天再把“破案结果”当寿诞惊喜递上去。他在戏楼装出一副仗势欺人的纨绔样，撞上世家子王烁当众欺凌少年阿七，于皓嘴上嚣张、手上护人，顺势把阿七从后台口拖出来；借着通行牌的“方便”，他又混进后台打听，却只撞见几句含糊的暗话与几只沾着宫中印泥的空匣，像有货刚走。钩子：阿七低声说出“后巷有人专收带宫中暗记的贡绸，还顺嘴打听北岭玄曜铁矿的活”，于皓听得心痒，反而更觉得自己抓到了大功劳——他把通行牌揣得更紧，准备下一步“狠狠干一票”。"
    cast_hint: ["于皓", "张福海", "阿七", "王烁", "戏楼后台管事(可疑)"]
    foreshadowing: "后台通行牌=致命证物；王烁=世家线反咬；‘问矿’与后续矿脉大线同源。"
  - id: "0003"
    title: "立功未成先背锅"
    summary: "承接：死士断口之后，内廷只能抓“线索”和“风评”——内库贡礼对不上账，寿诞礼制一下变成“必须抓人”的政治口子，于皓昨夜戏楼里那点“自作聪明”反倒成了最顺手的证据；推进：突查落到他头上：寝殿被搜出几样来路不清的贡礼碎件、暗记封条，连那枚戏楼后台通行牌也成了“皇子出入贼巢”的口实，像是有人把一整套证物按着他的手按下去。二皇子于睿顺势以“罚”为名把他拎出宫暗访坊市，让他亲眼看见贡绸在市面被层层加价、灵香被拆散卖给官绅，再用账本把一句话钉进他心里：所谓体面，都是从百姓骨头里刮出来的。钩子：于皓嘴上仍不服，回宫却把阿七那句“还问矿上的活”翻来覆去想了一夜——有人要的，可能从来不是几匹绸。"
    cast_hint: ["于皓", "于睿", "邵无咎", "秦同舟", "张福海"]
    foreshadowing: "‘寝殿搜出封条’=被推到前台的挡箭牌预演；账本=后续权谋与民生线的尺。"