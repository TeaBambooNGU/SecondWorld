series:
  title: "玄幻小说"
  premise: "神州分为九大域。表面是宗门争锋、皇朝更迭的大争之世，实则暗藏上古危机——人界本是天地二神的战场，二神沉睡百万年，人界必须在此期间诞生新神，方能阻止亿万生灵再遭涂炭。故事以九曜侯国三皇子于皓的流亡为起点，跟随一群出身各异的人，在九域法则的碰撞与吞噬中，挣扎求存，最终触碰世界的真相。"
  tone: "生动、幽默、权谋、群像、残酷、充满反讽与转折的东方玄幻"
  themes: ["在史诗废墟上蹦迪", "被遗忘者的觉醒与反抗", "热血成长", "兄弟义气", "我们以为在打BOSS，其实只是帮幕后黑手清了波野怪"]

world:
  setting: >
    神州分为九域：灵脉本源【中州】、宗门剑道【云州】、皇朝国运【龙廷】、仙凡暗治【玄渊州】、无序丛林【荒川】、岛海秘宝【沧溟海】、百艺垄断【灵州】、妖主图腾【妖域】、信仰愿力【琉璃净土】。
    九域表面独立，实则通过资源、阴谋与古老关联紧密交织，共同面对潜伏的危机。人界本是天地二神的战场，二神沉睡百万年，人界必须在此期间诞生两位新神，接替天地二界神位，方能真正自立。

  power_system: >
    武修序列：炼体境（皮/筋/骨/脏器）→ 开脉境（九重）→ 玄丹境（凝丹/养丹/化丹）
    → 涅槃境（九次蜕变，需凤凰血/九死草/轮回石）→ 武皇 → 武帝（十劫成神）。
    玄修序列：感灵境（九重）→ 聚玄境（九重）→ 命宫境（开宫/稳宫/显纹）
    → 神游境（离体/借势/归一）→ 玄皇 → 玄帝（十劫成神）。
    法宝等级：法器 → 灵器 → 法宝 → 古宝 → 灵宝 → 道器（天地造化所出，非人力可造）。
    伪神：九劫大帝炼化一种天地本源，不会遭遇第十劫，也无法成神。
    半神：六劫大帝至普通九劫大帝统称半神。



chapters:
  - id: "0001"
    title: "寿诞封箱见血"
    summary: "承接：御花园东廊下何镜山训礼，于皓被按着学寿宴流程；推进：贡礼押运路过时，于皓看出沉心蜡二次熔接痕，当众拦箱，库役立刻咬毒自尽，韩策封场；钩子：于皓趁乱从死者靴筒顺走“彩云轩后台木牌”，决定私查立功。"
    cast_hint: ["于皓", "何镜山", "柳清荷", "韩策", "张福海", "库役死士"]
    foreshadowing: "死士断口+刻意掉牌，说明主角被主动引入局。"

  - id: "0002"
    title: "彩云轩暗门与北岭风声"
    summary: "承接：于皓带血渍木牌直奔彩云轩，违背太傅“不可私查”的命令；推进：他先从王烁手下救下跑堂阿七，再持皇子玉佩闯后台，发现宫纹空匣与撬痕，听武生提“北边矿砂”，又从阿七口中得知后巷锦灰阁专收宫纹绸、并有人打听北岭玄曜铁矿大活；钩子：于皓当场定下夜探锦灰阁，而王烁已在对街酒肆派人盯梢。"
    cast_hint: ["于皓", "张福海", "阿七", "王烁", "彩云轩管事"]
    foreshadowing: "贡礼外流与矿线同源，且主角行动节奏已被敌方捕捉。"

  - id: "0003"
    title: "夜探锦灰阁"
    summary: "承接：于皓按0002章尾计划夜入锦灰阁后巷；推进：他与张福海在后门截到一批改签旧绸，摸进账房只拿到半页烧残账联（货物流向底单）与矿票号段（矿税批次编号），随后被预设巡夜逼退，几乎暴露身份；钩子：账联抬头竟连着礼部物料流转号，案子从黑市线抬进朝堂线。"
    cast_hint: ["于皓", "张福海", "锦灰阁掌柜", "夜巡打手"]
    foreshadowing: "敌方提前设防，说明内外有人共享情报。"

  - id: "0004"
    title: "闯礼部撞枪口"
    summary: "承接：于皓带着锦灰阁残账回宫，满脑子都是“立刻抓人”；推进：他不走流程直接闯礼部查号段、当场掀桌逼问，反被对方以“私持涉案账联”拖住，同时宫内突查传来——其寝殿搜出贡礼碎件与封条；钩子：于皓暴怒要回宫对质，于睿当场按住他：你现在冲回去，只会再送一个把柄。"
    cast_hint: ["于皓", "于睿", "张福海", "程元礼", "秦同舟"]
    foreshadowing: "主角冲动出手，正式从查案人跌成案中人。"

  - id: "0005"
    title: "被拎去看脏账"
    summary: "承接：于皓被于睿强行拖离礼部风口，嘴上一路骂骂咧咧；推进：两人化装走坊市，于皓亲眼见贡绸拆卖、灵香改签、多层抽成，却仍嘴硬“抓几个掌柜就够了”；钩子：于睿把“矿票与军粮价同涨”的账册拍到他怀里，点破这不是几匹绸缎的小案。"
    cast_hint: ["于皓", "于睿", "张福海", "坊市掌柜"]
    foreshadowing: "民生线与军需线并轨，案子升级为命脉争夺。"

  - id: "0006"
    title: "学府加课"
    summary: "承接：于皓被收回学府“闭门思过”，心里憋火；推进：他故意摆烂、阴阳太傅，却在九域地理课上顺嘴挑出旧图误标，暴露天赋；钩子：何镜山顺势加码，罚写《都城与边镇之距》并禁夜出，于皓嘴上认罚，心里却盘算换路子继续查。"
    cast_hint: ["于皓", "何镜山", "周夫子", "于睿"]
    foreshadowing: "主角尚未稳重，只是被迫把聪明往实用上拽。"

  - id: "0007"
    title: "羽林演武"
    summary: "承接：策论刚交，太傅立刻把于皓扔进羽林演武；推进：于皓被杜鸣三招放倒后还嘴硬挑衅，结果加练挨揍更狠，邵无咎给出“油滑有余、骨头不够硬”的评语；钩子：于皓不服输，转头拉张福海准备用银子扩线报网，想靠先破案扳回颜面。"
    cast_hint: ["于皓", "杜鸣", "邵无咎", "何镜山"]
    foreshadowing: "参军前仍是逞强心性，成长只停留在“挨打后换打法”。"

  - id: "0008"
    title: "败家试网"
    summary: "承接：演武吃瘪后，于皓把“面子”全押在市井情报上；推进：他借灯会撒钱改灯、扶戏班、雇跑腿，以“戏班口风+摊贩见闻+脚夫运单”搭网，线报暴增却真假混杂；钩子：红姑报来关键异动——收粮票与收矿票的商号名单高度重合。"
    cast_hint: ["于皓", "张福海", "红姑", "小李匠"]
    foreshadowing: "信息网是武器也是陷阱，主角筛选能力不足。"

  - id: "0009"
    title: "灯市火起"
    summary: "承接：于皓想借灯会做一场“翻盘秀”证明自己；推进：长街突发连片失火，他硬冲火场救下林小栀并组织水路灭火，名声短时逆转也让他更上头；钩子：受雇情报组织“夜鸦”已在高处完整记录其路线与接触点，主角行动模型被建档。"
    cast_hint: ["于皓", "林小栀", "张福海", "夜鸦探子"]
    foreshadowing: "主角越想证明自己，越容易被精确反制。"

  - id: "0010"
    title: "阿七失联与怒闯彩云轩"
    summary: "承接：于皓想乘热度继续深挖锦灰阁与阿七线；推进：阿七突然失踪，于皓带人冲进彩云轩后场翻人，被王烁反手做成“皇子逼供闹市”的话本，首批线人吓散；钩子：张福海只抢回一条残讯——阿七失踪前仍在盯北岭矿道。"
    cast_hint: ["于皓", "张福海", "王烁", "红姑", "彩云轩管事"]
    foreshadowing: "主角冲动加速证人链折损。"

  - id: "0011"
    title: "密报摊图"
    summary: "承接：彩云轩一闹反噬全城，于睿强行把于皓按回书房；推进：于睿与影卫线联络人陆沉沙摊开北境密报与矿脉图，讲清玄曜铁矿直连军械命脉，都城囤票与边镇短供同步；钩子：于皓嘴上仍说“我自己能搞定”，夜里却偷抄号段准备再赌一把。"
    cast_hint: ["于皓", "于睿", "陆沉沙", "张福海"]
    foreshadowing: "主角仍是逞强路线，只是工具更专业。"

  - id: "0012"
    title: "再赌一把，满盘皆输"
    summary: "承接：于皓背着二哥按号段私设跟单局，想一把抓实幕后商路；推进：假单被识破、线人被反买、账册被替换，他本人还险被扣“扰商串案”罪名；钩子：何镜山只留一句“你把热血当本事”，同日赤砂使团入京，案子被推入更大棋盘。"
    cast_hint: ["于皓", "何镜山", "张福海", "商号掌柜"]
    foreshadowing: "连续失手后，主角仍未成熟，只是被迫收敛锋芒。"

  - id: "0013"
    title: "赤砂使团入京"
    summary: "承接：于皓追线再败，外部压力同时压境；推进：赤砂使团以贺寿名义入京，礼部全线收紧并重翻贡礼旧案，各派提前争夺事故定性权；钩子：程元礼当面警告于皓不得再碰庆典物料，于皓表面应下、心里更不服。"
    cast_hint: ["于皓", "程元礼", "于睿", "何镜山", "赤砂使团"]
    foreshadowing: "内斗与外患将被捆成一把刀。"

  - id: "0014"
    title: "烟火提案"
    summary: "承接：于皓不甘心被封手，决定用“献礼烟火”抢回话语权；推进：他硬走公开流程递案，礼部层层卡审，何镜山逼其全程留痕，张福海却查到备用火药编号与报备单不符；钩子：于皓既上头又发怵——有人正等这场庆典出事。"
    cast_hint: ["于皓", "张福海", "程元礼", "何镜山", "林小栀"]
    foreshadowing: "事故导火索已具备可追责物证。"

  - id: "0015"
    title: "宫宴试探"
    summary: "承接：使团与宫宴同场，政治压强到顶；推进：兀术借边贸和军需言语施压，于皓一时上头以“童言”硬顶回去，虽逼出对方对九曜命脉的异常熟悉，也把自己再次推上风口；钩子：于承曜表面斥子，私下却加派禁军盯烟火台。"
    cast_hint: ["于皓", "兀术", "于承曜", "于睿", "沈昭容"]
    foreshadowing: "皇帝已预判风险，但无法公开掀桌。"

  - id: "0016"
    title: "烟火事故"
    summary: "承接：点火时刻来临，礼部与禁军双线绷紧；推进：首轮烟火反向爆燃，礼器尽毁、使团受惊、宫墙起火，且现场再现二次替换痕迹；钩子：事故后不足半个时辰，坊间已流出三版“真相”。"
    cast_hint: ["于皓", "程元礼", "于承曜", "何镜山", "邵无咎", "兀术"]
    foreshadowing: "叙事战先于调查战开打。"

  - id: "0017"
    title: "三份卷宗"
    summary: "承接：事故余烬未冷，御史台连夜入场；推进：同案被拆成礼部失职版、皇子妄为版、外敌渗透版三套卷宗，朝堂争的是先定哪一版，于皓当场几次要顶嘴被于睿按下；钩子：何镜山明言，想活就得先接受“制度切割”（先切公开身份与责任口，后续再留翻案口）。"
    cast_hint: ["何镜山", "于皓", "许衡", "程元礼", "于睿"]
    foreshadowing: "主角命运由止血逻辑而非真相逻辑决定。"

  - id: "0018"
    title: "御书房止血"
    summary: "承接：三版卷宗互咬，公开硬判将牵动军权税路；推进：于承曜与于睿密谈后定下私下处置，核心是止血，不是翻案；钩子：次日京兆府以“灯市失火善后、清查火药私售”名义先动外围，邵无咎同时接密令为于皓制作去名军籍。"
    cast_hint: ["于承曜", "于睿", "邵无咎", "何镜山"]
    foreshadowing: "去名入军兼具保护与放逐双重属性。"

  - id: "0019"
    title: "流言先行"
    summary: "承接：0018章尾京兆府已以善后清查名义下场，处置未宣而外围先动；推进：差役先压彩云轩与红姑戏班、再借“查火药私售”搜林小栀摊位并盘问往来名册，于皓最初想硬抗，结果越闹越连累人，只得在于睿逼压下裁撤高风险线人点；钩子：他嘴上仍不服，心里却第一次承认自己把热闹当能力。"
    cast_hint: ["于皓", "红姑", "林小栀", "张福海", "京兆府差役"]
    foreshadowing: "这是被现实打痛后的收手，不是成熟定型。"

  - id: "0020"
    title: "太傅最后一课"
    summary: "承接：流言反噬后，于皓冲去找于睿要幕后名单，扬言现在就反打；推进：于睿明言名单此刻不能动，只给边军自保与观察线（记录补给、矿料、军械三线异常并留存），点破皇权止血已定、翻案只能后置；钩子：于皓摔门后又折回，咬牙去找何镜山补北境军制与行军图。"
    cast_hint: ["于皓", "于睿", "何镜山", "张福海"]
    foreshadowing: "主角仍是硬顶型，只是开始学会把火气往活路上用。"

  - id: "0021"
    title: "私旨去名"
    summary: "承接：御书房止血定调后，宫中正式进入切割执行；推进：能否切割与如何切割均由九曜侯于承曜拍板，他私令于皓自底层入军，不发公开圣旨以免再掀朝争，邵无咎据令完成去名落籍（军籍仅留化名与编号）；钩子：沈昭容递行囊，只留一句“别死在别人写好的剧本里”。"
    cast_hint: ["于皓", "于承曜", "沈昭容", "邵无咎", "于睿", "张福海"]
    foreshadowing: "保护伞移除，军旅生死权重拉满。"

  - id: "0022"
    title: "踏出龙廷"
    summary: "承接：军籍成档，禁足解除只为出城；推进：于皓黎明前辞别母后与兄长，携暗号“灯尽入北营”与行军图副本离宫，此暗号仅用于向北营指定接应校尉做去名身份校验与一次保命启用，身份由皇子切成新兵；钩子：城门外首道军令是限时抵营，京都篇在军号声中收束。"
    cast_hint: ["于皓", "于睿", "沈昭容", "张福海", "边军引导官"]
    foreshadowing: "无缝接入下一阶段军旅线。"
