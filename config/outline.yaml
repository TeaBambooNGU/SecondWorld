series:
  title: "玄幻小说"
  premise: "灵气复苏三万年后，神州裂分为法则迥异的九大域。表面是仙魔争锋、王朝更迭的大争之世，实则暗藏上古危机与各方势力掠夺气运、编织阴谋的巨网。故事跟随不同出身的角色，在九域法则的碰撞与吞噬中，探寻世界真相并挣扎求存。"
  tone: "生动、幽默、权谋、群像、残酷、充满反讽与转折的东方玄幻"
  themes: ["在史诗废墟上蹦迪", "被遗忘者的觉醒与反抗", "热血成长", "兄弟义气", "我们以为在打BOSS，其实只是帮幕后黑手清了波野怪"]

world:
  setting: "灵气复苏纪元三万载，神州裂分九域：灵脉本源【中州】、宗门剑道【云州】、皇朝国运【龙廷】、仙凡暗治【玄渊州】、无序丛林【荒川】、岛海秘宝【沧溟海】、百艺垄断【灵州】、妖主图腾【妖域】、信仰愿力【琉璃净土】。九域表面独立，实则通过资源、阴谋与古老关联紧密交织，共同面对潜伏的危机"
  power_system: "九域九法，多元并存。核心围绕灵气展开，但各域演化出独特体系：中州（灵脉与法则）、云州（剑道与宗门传承）、龙廷（皇权与国运修为）、玄渊州（仙凡双轨制）、荒川（掠夺与禁忌传承）、沧溟海（秘宝与海陆之力）、灵州（丹符阵器等技艺造物）、妖域（妖族血脉与人族图腾祖灵之力）、琉璃净土（信仰愿力与佛法）。不同体系间存在压制、互补与冲突"

chapters:
  - id: "0001"
    title: "三皇子今日也不想修炼"
    summary: "清晨御花园演武场点名修炼，于皓却靠在石栏上装死，用“躺平哲学”把太傅绕进死胡同：修炼为长寿，长寿为多吃点心。说着他掏炭笔在地上画御膳房点心流向“路线图”，标出风大不易追的廊道与最松懈的换班时辰，张福海在旁急得直咳。何镜山气得发抖，骂他不怕罚只怕无聊，伸手要夺笔，他却把话题拐到“宫中制度才是偷懒之源”，还把修炼时辰与点心出炉对照成一张“勤学也要吃好”的表格。于承曜远远听着压笑不拦；沈昭容隔扇笑骂“嘴太贫”，却也没真罚。"
    foreshadowing: "懒散的于皓在父皇和母后纵容下，肆无忌惮的顶撞太傅"
    cast_hint: ["于皓", "九曜侯于承曜", "侯后沈昭容", "太傅何镜山", "内侍张福海"]

  - id: "0002"
    title: "皇城第一纨绔的自我修养"
    summary: "宫外戏楼，于皓一进场就故意摆出纨绔架子，抬手要‘赏罚’，气势吓人，实则把世家子王烁的手从被欺凌的少年阿七身上拦下来。他装作仗势欺人，逼王烁在众目下退让，又顺势把看客情绪扭成‘皇城第一纨绔替弱者出头’，让阿七得以退到柱影后。戏台上唱忠义，他台下用笑话立规矩，既给百姓一个出口，也给世家子留面子。他瞥见包厢窗影，知道父皇在看，故意把分寸拿捏得更足。隔壁包厢里，微服的于承曜端茶看戏，既看台上唱段，也看儿子用‘胡闹’挪动人心。父子对视一笑，一边是宠溺，一边是清醒：越是纵容，越得记住边界与规矩。"
    foreshadowing: "纨绔外衣能护人也能伤人，稍有不慎会被人拿来做文章。"
    cast_hint: ["于皓", "于承曜", "（被救少年）阿七", "（世家子弟）王烁"]